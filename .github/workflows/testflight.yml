name: TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

# A newer push supersedes any build still running.
concurrency:
  group: testflight
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter setup
        run: |
          flutter config --enable-swift-package-manager
          flutter pub get

      - name: Analyze and test
        run: |
          flutter analyze
          flutter test

      - name: Import distribution certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.DIST_CERT_P12_B64 }}
          p12-password: ${{ secrets.DIST_CERT_PASSWORD }}

      - name: Install provisioning profile
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "${{ secrets.PROVISIONING_PROFILE_B64 }}" | base64 --decode \
            > "$HOME/Library/MobileDevice/Provisioning Profiles/subtitle-glasses-appstore.mobileprovision"

      # Compiles Dart + resolves the SPM plugin packages; the archive step
      # below re-signs with the distribution identity, so no signing here.
      # The build number comes from the monotonically increasing run number,
      # so every push produces a higher build than the last.
      - name: Build Flutter app
        run: flutter build ios --release --no-codesign --build-number "$GITHUB_RUN_NUMBER"

      - name: Archive with distribution signing
        run: |
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/Runner.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=LKLVLNJ27M \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER=subtitle-glasses-appstore

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ios/ExportOptions.plist
          mv build/ipa/*.ipa build/ipa/app.ipa

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: build/ipa/app.ipa
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_KEY_P8 }}
